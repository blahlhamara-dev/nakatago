<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFNC</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;600;700&display=swap');

        :root {
            --neon-blue: #00d4ff;
            --neon-pink: #ff00ff;
            --status-online: #23a55a;
            --status-idle: #f0b232;
            --status-dnd: #f23f43;
            --status-offline: #80848e;
            --discord-dark: #111214;
            --discord-gray: #b5bac1;
            --neon-yellow: #ffd700;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: default; }
        html { scroll-behavior: smooth; }

        body {
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('banner.gif') no-repeat center center;
            background-size: cover;
            opacity: 0.15;
            z-index: -1;
            filter: contrast(120%) brightness(0.8);
            pointer-events: none;
            animation: wavePulse 5s ease-in-out infinite;
        }

        @keyframes wavePulse {
            0%, 100% { opacity: 0.10; filter: brightness(0.7); }
            50% { opacity: 0.18; filter: brightness(1.1); }
        }

        h1, h2, h3, .title, nav a { font-family: 'Orbitron', sans-serif; text-transform: uppercase; letter-spacing: 2px; }

        .user-node {
            position: relative;
            background: none; border: none; padding: 10px; text-align: center;
            transition: 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .avatar-wrap { 
            position: relative; 
            width: 85px; 
            height: 85px; 
            margin: 0 auto 5px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .avatar-wrap img { 
            width: 65px; 
            height: 65px; 
            border-radius: 50%; 
            border: 3px solid var(--status-offline); 
            position: relative; 
            z-index: 1; 
            object-fit: cover; 
            background: #222;
        }

        /* Status dot sa gilid */
        .status-dot {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid #000;
            z-index: 2;
        }
        .status-online { background: var(--status-online); }
        .status-idle { background: var(--status-idle); }
        .status-dnd { background: var(--status-dnd); }
        .status-offline { background: var(--status-offline); }

        #splash { 
            position: fixed; 
            inset: 0; 
            background: #000; 
            z-index: 10000; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            transition: opacity 0.5s ease; 
            cursor: pointer; 
        }
        #splash.hidden { opacity: 0; pointer-events: none; }
        .enter-text { 
            font-size: clamp(1.5rem, 5vw, 3rem); 
            background: linear-gradient(90deg, #fff, var(--neon-blue), #fff); 
            background-size: 200%; 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            animation: shine 3s infinite linear; 
            margin-bottom: 15px;
        }
        .click-text { color: #444; font-size: 0.7rem; }
        @keyframes shine { to { background-position: 200% center; } }

        nav { position: sticky; top: 0; z-index: 100; background: rgba(0,0,0,0.6); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.05); padding: 20px 0; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        nav a { color: #aaa; text-decoration: none; font-size: 0.8rem; transition: 0.4s; }
        nav a:hover { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }

        section { padding: 40px 20px; max-width: 1200px; margin: 0 auto; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 25px; margin-top: 20px; justify-items: center; }

        .member-marquee-container {
            display: flex;
            flex-direction: column;
            gap: 30px;
            width: 100%;
            overflow: hidden;
            mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
        }
        .member-track { display: flex; gap: 40px; width: max-content; }
        .track-left { animation: scrollLeft 40s linear infinite; }
        .track-right { animation: scrollRight 40s linear infinite; }
        @keyframes scrollLeft { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        @keyframes scrollRight { 0% { transform: translateX(-50%); } 100% { transform: translateX(0); } }

        .member-role-tag { display: inline-block; font-size: 0.55rem; padding: 2px 6px; border-radius: 4px; font-weight: 700; text-transform: uppercase; margin-top: 4px; }
        .member-role-tag.regular { background: rgba(255, 215, 0, 0.1); border: 1px solid rgba(255, 215, 0, 0.2); color: var(--neon-yellow); }
        .member-role-tag.trial { background: rgba(0, 212, 255, 0.1); border: 1px solid rgba(0, 212, 255, 0.2); color: var(--neon-blue); }

        .music-widget { position: fixed; bottom: 20px; right: 20px; background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(10px); padding: 12px 18px; border-radius: 50px; display: flex; align-items: center; gap: 12px; border: 1px solid rgba(255,255,255,0.1); z-index: 1000; }
    </style>
</head>
<body>

    <div id="splash">
        <h1 class="enter-text">[ INITIALIZING PROTOCOL ]</h1>
        <p class="click-text">CLICK TO ENTER</p>
    </div>

    <nav>
        <a href="#founder">FOUNDER</a>
        <a href="#core">DAY ONE'S</a>
        <a href="#members">MEMBERS</a>
        <a href="#security">SECURITY</a>
        <a href="#servers">SERVERS</a>
    </nav>

    <main>
        <header style="text-align: center; padding: 60px 20px;">
            <h1 class="title" style="font-size: clamp(2rem, 8vw, 4rem);">NO FACE NO CASE</h1>
        </header>

        <section id="founder">
            <h2 style="text-align:center; margin-bottom: 30px; font-size: 0.9rem; color: var(--neon-pink);">[ FOUNDER ]</h2>
            <div style="display: flex; justify-content: center;">
                <div class="user-node" data-discord-id="1375511796890337390">
                    <div class="avatar-wrap">
                        <img src="" alt="BLAH" class="avatar">
                        <div class="status-dot"></div>
                    </div>
                    <h3>BLAH</h3>
                    <p style="color: var(--neon-pink); font-size: 0.7rem; font-weight: bold;">FOUNDER</p>
                </div>
            </div>
        </section>

        <section id="core">
            <h2 style="text-align:center; margin-bottom: 30px; font-size: 0.9rem; color: var(--neon-blue);">[ DAY ONE'S ]</h2>
            <div class="grid-container">
                <div class="user-node" data-discord-id="1255196462195806290">
                    <div class="avatar-wrap"><img src="" alt="ESH" class="avatar"><div class="status-dot"></div></div>
                    <h3>ESH</h3><p style="color: var(--neon-blue); font-size: 0.65rem;">1OF1</p>
                </div>
                <div class="user-node" data-discord-id="1475526026422649115">
                    <div class="avatar-wrap"><img src="" alt="PNK" class="avatar"><div class="status-dot"></div></div>
                    <h3>PNK</h3><p style="color: var(--neon-blue); font-size: 0.65rem;">----</p>
                </div>
                <div class="user-node" data-discord-id="1489962785839386755">
                    <div class="avatar-wrap"><img src="" alt="MOOZIE" class="avatar"><div class="status-dot"></div></div>
                    <h3>MOOZIE</h3><p style="color: var(--neon-blue); font-size: 0.65rem;">----</p>
                </div>
                <div class="user-node" data-discord-id="1414171167883001876">
                    <div class="avatar-wrap"><img src="" alt="PRINCE" class="avatar"><div class="status-dot"></div></div>
                    <h3>PRINCE</h3><p style="color: var(--neon-blue); font-size: 0.65rem;">HANDLER</p>
                </div>
                <div class="user-node" data-discord-id="851613391096381440">
                    <div class="avatar-wrap"><img src="" alt="EZEE" class="avatar"><div class="status-dot"></div></div>
                    <h3>EZEE</h3><p style="color: var(--neon-blue); font-size: 0.65rem;">HANDLER</p>
                </div>
                <div class="user-node" data-discord-id="1505646697290924103">
                    <div class="avatar-wrap"><img src="" alt="JEREMY" class="avatar"><div class="status-dot"></div></div>
                    <h3>JEREMY</h3><p style="color: var(--neon-blue); font-size: 0.65rem;">Roster Admin</p>
                </div>
                <div class="user-node" data-discord-id="1421541305309335643">
                    <div class="avatar-wrap"><img src="" alt="NIO" class="avatar"><div class="status-dot"></div></div>
                    <h3>NIO</h3><p style="color: var(--neon-blue); font-size: 0.65rem;">Roster Admin</p>
                </div>
            </div>
        </section>

        <section id="members">
            <h2 style="text-align:center; margin-bottom: 40px; font-size: 0.9rem; color: var(--neon-yellow);">[ MEMBERS ]</h2>
            <div class="member-marquee-container">
                <div class="member-track track-left" id="track1"></div>
                <div class="member-track track-right" id="track2"></div>
            </div>
        </section>
    </main>

    <div class="music-widget">
        <button id="m-toggle" style="background:none; border:none; color:white; cursor:pointer;">
            <svg id="play-icon" viewBox="0 0 24 24" width="18" height="18"><path d="M8 5v14l11-7z"/></svg>
            <svg id="pause-icon" viewBox="0 0 24 24" width="18" height="18" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <div>
            <span style="font-size:0.8rem;">Music</span><br>
            <span style="font-size:0.6rem; color:#888;">NOW PLAYING</span>
        </div>
        <input type="range" id="volume" min="0" max="1" step="0.01" value="0.2" style="width:80px;">
    </div>

    <!-- 🎵 BAGONG SIGURADONG GUMAGANANG AUDIO -->
    <audio id="bg-audio" loop preload="auto">
        <source src="https://assets.mixkit.co/music/preview/mixkit-digital-glitch-1285.mp3" type="audio/mpeg">
        <source src="https://cdn.freesound.org/previews/414/414065_5125844-lq.mp3" type="audio/mpeg">
    

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const splash = document.getElementById('splash');
        const audio = document.getElementById('bg-audio');
        const mToggle = document.getElementById('m-toggle');
        const volumeSlider = document.getElementById('volume');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');

        // --------------------------
        // 1. SPLASH SCREEN & AUDIO
        // --------------------------
        function enterSite() {
            splash.classList.add('hidden');
            audio.volume = volumeSlider.value;
            audio.play().catch(e => console.log("Audio blocked:", e));
        }
        splash.addEventListener('click', enterSite);
        splash.addEventListener('touchend', e => { e.preventDefault(); enterSite(); });

        mToggle.addEventListener('click', () => {
            if (audio.paused) { audio.play(); playIcon.style.display = 'none'; pauseIcon.style.display = 'inline'; }
            else { audio.pause(); playIcon.style.display = 'inline'; pauseIcon.style.display = 'none'; }
        });
        volumeSlider.addEventListener('input', () => audio.volume = volumeSlider.value);

        // --------------------------
        // 2. KUHA ANG DISCORD AVATAR
        // --------------------------
        async function loadDiscordInfo() {
            const nodes = document.querySelectorAll('.user-node');
            for (const node of nodes) {
                const userId = node.getAttribute('data-discord-id');
                const avatarImg = node.querySelector('.avatar');
                const statusDot = node.querySelector('.status-dot');

                try {
                    // Gamit ang libreng proxy para makuha ang impormasyon
                    const res = await fetch(`https://api.allorigins.win/raw?url=https://api.lanyard.rest/v1/users/${userId}`);
                    const data = await res.json();
                    
                    if (data.success) {
                        const user = data.data.discord_user;
                        const status = data.data.discord_status;

                        // Avatar
                        if (user.avatar) {
                            const ext = user.avatar.startsWith('a_') ? 'gif' : 'png';
                            avatarImg.src = `https://cdn.discordapp.com/avatars/${userId}/${user.avatar}.${ext}?size=128`;
                        } else {
                            const defNum = user.discriminator === '0' ? Number(BigInt(userId) >> 22n) % 6 : Number(user.discriminator) % 5;
                            avatarImg.src = `https://cdn.discordapp.com/embed/avatars/${defNum}.png`;
                        }

                        // Status
                        statusDot.className = `status-dot status-${status}`;
                    }
                } catch (err) {
                    console.log("Error loading user:", userId, err);
                    // Default avatar kapag may error
                    avatarImg.src = `https://cdn.discordapp.com/embed/avatars/0.png`;
                }
            }
        }

        // --------------------------
        // 3. BUILD MEMBER LIST
        // --------------------------
        const membersRow1 = [
            {id:"1499079877389975673", name:"PJ", tag:"DESTROYER", type:"regular"},
            {id:"901323764665573437", name:"ACKZ", tag:"NAKATAGO", type:"regular"},
            {id:"1508001150962765964", name:"CLEMS", tag:"DESTROYER", type:"regular"},
            {id:"1509144884211351672", name:"2kPing", tag:"NAKATAGO", type:"regular"},
            {id:"1094262399785250926", name:"ZERO", tag:"NAKATAGO", type:"regular"}
        ];
        const membersRow2 = [
            {id:"1501047743378886678", name:"YOZIR", tag:"DESTROYER", type:"regular"},
            {id:"1383127548413743154", name:"KEN", tag:"NFNC", type:"regular"},
            {id:"1471133660144078910", name:"VIN", tag:"ENEMY", type:"trial"},
            {id:"1469367256273256632", name:"CCER", tag:"ENEMY", type:"trial"},
            {id:"1467935676694532408", name:"ANGHELL", tag:"EXCLSV", type:"trial"}
        ];

        function buildNode(m) {
            return `
            <div class="user-node" data-discord-id="${m.id}">
                <div class="avatar-wrap">
                    <img src="https://cdn.discordapp.com/embed/avatars/0.png" alt="${m.name}" class="avatar">
                    <div class="status-dot"></div>
                </div>
                <h3>${m.name}</h3>
                <span class="member-role-tag ${m.type}">${m.tag}</span>
            </div>`;
        }

        document.getElementById('track1').innerHTML = membersRow1.map(buildNode).join('') + membersRow1.map(buildNode).join('');
        document.getElementById('track2').innerHTML = membersRow2.map(buildNode).join('') + membersRow2.map(buildNode).join('');

        // Patakbuhin ang pagkuha ng impormasyon
        setTimeout(loadDiscordInfo, 500);
    });
    </script>

</body>
</html>
